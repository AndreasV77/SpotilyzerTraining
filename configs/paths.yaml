# Pfad-Konfiguration für SpotilyzerTraining
#
# WICHTIG: Daten werden NICHT im Repository gespeichert!
# Alles liegt unter data_root (G:/Dev/SpotilyzerData).

paths:
  # Externes Datenverzeichnis (NICHT im Repo)
  data_root: "G:/Dev/SpotilyzerData"

  # Preview-Dateien (MD5-Sharding: previews/{hash[:2]}/{track_id}.mp3)
  previews: "G:/Dev/SpotilyzerData/previews"

  # Metadaten (JSONL)
  metadata: "G:/Dev/SpotilyzerData/metadata"

  # Playlists (M3U8)
  playlists: "G:/Dev/SpotilyzerData/playlists"

  # MERT-Embeddings (können im Repo bleiben, ~50-100 MB)
  embeddings: "./outputs/embeddings"

  # Trainierte Modelle
  models: "./outputs/models"

  # Reports und Logs
  reports: "./outputs/reports"
  logs: "./logs"

  # Spotify Charts CSV-Exports (manuell gezogen von charts.spotify.com)
  # Struktur: spotify/{YYYY-MM-DD}/regional-{country}-weekly-{date}.csv
  spotify_charts: "G:/Dev/SpotilyzerData/spotify"

  # Modul-Datensätze (separate JSONL pro Modul)
  # Struktur: datasets/{modul}/tracks.jsonl
  datasets: "G:/Dev/SpotilyzerData/datasets"

  # Hauptprojekt-Pfad (für Model-Deployment)
  main_project: "../Spotilyzer"
  main_project_models: "../Spotilyzer/models"
