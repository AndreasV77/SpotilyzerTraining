# Genre-Cluster-Definitionen für SpotilyzerTraining
#
# Jeder Cluster hat:
#   display_name:  Anzeigename
#   description:   Kurzbeschreibung
#   seed_artists:  Liste von Artists für Deezer-Scouting (Artist Top-Tracks)
#   radios:        Optional — Deezer Radio-IDs als zusätzliche Track-Quelle
#                  (Erfordert Radio-Scouting-Support in scout_deezer.py)
#
# Tracks werden über Artist Top-Tracks und/oder Radio-Tracklisten gesammelt.
# Ein Track kann mehreren Clustern angehören.
#
# Deezer Genre-IDs zur Referenz:
#   84=Country  85=Alternative  106=Electro  113=Dance  116=Rap/Hip-Hop
#   132=Pop     144=Reggae      152=Rock     153=Blues  165=R&B
#   169=Soul&Funk  197=Latin    464=Heavy Metal  466=Folk

