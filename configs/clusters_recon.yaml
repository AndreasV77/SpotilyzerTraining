# ══════════════════════════════════════════════════════════════════════════════
# RECON-SPEZIFISCHE EINSTELLUNGEN
# ══════════════════════════════════════════════════════════════════════════════

recon_settings:
  # Welche Kategorien standardmäßig analysieren?
  default_scope:
    - validated
    - suspicious  # Auch verdächtige Charts analysieren, um Entscheidung zu treffen
  
  # Spam-Detection-Schwellenwerte
  spam_detection:
    single_artist_dominance_threshold: 0.3  # >30% = Warnung
    min_artist_diversity: 0.5               # <0.5 = Warnung
    min_recent_releases_percent: 0.3        # <30% aus letzten 12 Monaten = veraltet
    suspicious_rank_median: 900000          # >900k = Nischen-Content
