deezer:
  hit_threshold: 700000
  flop_threshold: 300000

lastfm:
  # Kalibriert: Last.fm-Bias berücksichtigt (englischsprachig, historische Daten)
  # hit:  >= 1M Plays UND >= 100k Listeners  (war: 5M / 500k — viel zu hoch)
  # flop: <  100k Plays ODER < 10k Listeners (war: 500k / 50k — zu hoch)
  hit_playcount: 1000000
  hit_listeners: 100000
  flop_playcount: 100000
  flop_listeners: 10000

sample_weights:
  validated: 1.0       # Beide Quellen einig
  single_source: 0.5   # Nur Deezer verfügbar
  contested: 0.7       # Quellen widersprechen sich

composite_score:
  # Multiplikatoren für UI-Darstellung
  robustness_factors:
    validated: 1.0
    single_source: 0.85
    contested: 0.7
