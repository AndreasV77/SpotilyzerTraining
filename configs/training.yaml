# Embedder-Modell für Embedding-Extraktion und Training
# Diesen Eintrag ändern, um auf ein anderes MERT-Modell zu wechseln.
# extract_embeddings.py liest ihn und schreibt in outputs/embeddings/<short-name>/
# train_model.py liest ihn und sucht Embeddings im gleichen Unterverzeichnis.
embedder:
  model: "m-a-p/MERT-v1-95M"   # Optionen: "m-a-p/MERT-v1-95M" | "m-a-p/MERT-v1-330M"

# Optionales Experiment-Label (erscheint im Modell-Dateinamen, leer lassen wenn nicht benötigt)
# Beispiel: experiment_label: "balA"  → spotilyzer_model_MERTv1330M_balA_...joblib
experiment_label: ""

# Klassengewicht-Multiplikatoren (werden auf compute_sample_weight("balanced") draufmultipliziert)
# 1.0 = keine Änderung. Erhöhe mid/flop um deren Recall zu verbessern.
# Experimente:
#   balA: nur --max-hits 6000, boost alle 1.0
#   balB: kein Undersampling, mid=1.5 flop=1.2
#   balC: --max-hits 6000 + mid=1.5 flop=1.2
#   expDim: höhere Dimension, 330M mit max_depth=6 + colsample=0.8
class_weight_boost:
  hit: 1.0
  mid: 1.0
  flop: 1.0

# ──────────────────────────────────────────────────────────────────────────────
# Per-Embedder XGBoost-Parameter
# train_model.py liest zuerst models.<short-name>.params, fällt auf model.params zurück.
# Begründung für unterschiedliche Werte:
#   95M  (768-dim):  Geringere Overfitting-Gefahr durch niedrigere Dimension
#                    → tiefere Bäume (max_depth=6), mehr Features pro Baum (colsample=0.8)
#   330M (1024-dim): Höhere Overfitting-Gefahr durch höhere Dimension
#                    → flachere Bäume (max_depth=4), weniger Features pro Baum (colsample=0.6)
# ──────────────────────────────────────────────────────────────────────────────
models:
  MERT-v1-95M:
    params:
      n_estimators: 500        # Hoch setzen — early stopping findet das Optimum
      max_depth: 4
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      min_child_weight: 3
      gamma: 0.1
      reg_alpha: 0.5
      reg_lambda: 2
      objective: "multi:softprob"
      num_class: 3
      eval_metric: "mlogloss"

  MERT-v1-330M:
    params:
      n_estimators: 500
      max_depth: 4             # 1024-dim: flachere Bäume gegen Overfitting
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.6    # 1024-dim: weniger Features pro Baum
      min_child_weight: 3
      gamma: 0.1
      reg_alpha: 0.5
      reg_lambda: 2
      objective: "multi:softprob"
      num_class: 3
      eval_metric: "mlogloss"

# Fallback-Parameter wenn kein per-Embedder-Eintrag vorhanden
model:
  type: xgboost
  params:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    gamma: 0.1
    reg_alpha: 0.5
    reg_lambda: 2
    objective: "multi:softprob"
    num_class: 3
    eval_metric: "mlogloss"

# Early Stopping: Training stoppt wenn eval_metric sich n Runden nicht verbessert
early_stopping_rounds: 30

validation:
  strategy: stratified_kfold
  n_splits: 5
  shuffle: true

random_state: 42

# Metriken für Evaluation
target_metrics:
  flop_recall_min: 0.50
  hit_recall_min: 0.80
  balanced_accuracy_min: 0.65
